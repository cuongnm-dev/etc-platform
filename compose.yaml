# etc-docgen MCP Server with volume mounts for project data
#
# Usage:
#   docker compose up -d
#   → SSE endpoint: http://localhost:8000/sse
#
# Mount your project directory to /data for export/validate tools

services:
  mcp-server:
    build: .
    image: etc-docgen-mcp:latest
    ports:
      - "8000:8000"
    volumes:
      # Mount project data for validate/export/merge_content tools
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://localhost:8000/sse')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 5s
